{{define "content"}}
<h1>全部商品</h1>
{{if not .Items}}<p class="muted">店铺还没有上架商品。</p>{{end}}
<div class="grid">
  {{range .Items}}
  <a class="card" href="/p/{{.Slug}}">
    {{if .ThumbURL}}<img class="ph" src="{{.ThumbURL}}" alt="{{.Title}}" loading="lazy" width="300" height="300" />{{else}}<span class="ph"></span>{{end}}
    <div class="body">
      <div class="t">{{.Title}}</div>
      <div class="price">{{money .FromCents}} 起</div>
    </div>
  </a>
  {{end}}
</div>
{{end}}
