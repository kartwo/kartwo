{{define "base"}}<!DOCTYPE html>
<!-- Kartwo 店面 / Storefront. 作者：仗键天涯(daxing) 3442535897@qq.com -->
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{.SEO.Title}}</title>
  <meta name="description" content="{{.SEO.Description}}" />
  <link rel="canonical" href="{{.SEO.Canonical}}" />
  <meta property="og:type" content="{{.SEO.OGType}}" />
  <meta property="og:title" content="{{.SEO.Title}}" />
  <meta property="og:description" content="{{.SEO.Description}}" />
  <meta property="og:url" content="{{.SEO.Canonical}}" />
  {{if .SEO.OGImage}}<meta property="og:image" content="{{.SEO.OGImage}}" />{{end}}
  <meta name="twitter:card" content="summary_large_image" />
  {{.SEO.JSONLD}}
  <style>
    :root{--bg:#fff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--accent:#0ea5e9}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:var(--bg);line-height:1.5}
    a{color:var(--accent);text-decoration:none}
    header.site{border-bottom:1px solid var(--line)}
    .wrap{max-width:1040px;margin:0 auto;padding:0 1rem}
    header.site .wrap{display:flex;align-items:center;justify-content:space-between;height:60px}
    .brand{font-weight:800;font-size:1.2rem;color:var(--ink)}
    main{padding:1.4rem 0 3rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.2rem}
    .card{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
    .card .ph{aspect-ratio:1/1;background:#f1f5f9;display:block;width:100%;object-fit:cover}
    .card .body{padding:.7rem .8rem}
    .card .t{font-weight:600}
    .price{color:var(--ink);font-weight:700}
    .muted{color:var(--muted)}
    .crumbs{font-size:.85rem;color:var(--muted);margin:.2rem 0 1rem}
    .detail{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
    @media(max-width:720px){.detail{grid-template-columns:1fr}}
    .gallery img{width:100%;border:1px solid var(--line);border-radius:12px;margin-bottom:.8rem}
    .opts{margin:1rem 0}
    .opt-row{margin:.4rem 0}
    .chip{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:.15rem .7rem;margin:.15rem;font-size:.85rem}
    .btn{display:inline-block;background:var(--accent);color:#fff;border:0;border-radius:10px;padding:.7rem 1.2rem;font:inherit;font-weight:600;cursor:pointer}
    .btn[disabled]{opacity:.5;cursor:not-allowed}
    .stock-in{color:#059669}.stock-out{color:#dc2626}
    footer.site{border-top:1px solid var(--line);color:var(--muted);font-size:.85rem;padding:1.2rem 0}
  </style>
</head>
<body>
  <header class="site"><div class="wrap"><a class="brand" href="/">{{.ShopName}}</a><nav><a href="/">全部商品</a></nav></div></header>
  <main><div class="wrap">{{template "content" .}}</div></main>
  <footer class="site"><div class="wrap">由 Kartwo 驱动 · {{.ShopName}}</div></footer>
</body>
</html>{{end}}
